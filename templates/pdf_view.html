    <div id="quiz-section" class="mt-4 roboto">

    <!--AJAX that both the CS50 duck and GPT helped me learn and understand-->
    <script>
      function generatequiz() {
          const filePath = "{{ file_path }}";  // pass file path to the backend
          const loadingIcon = document.getElementById('loading-icon'); // get the loading icon element

          loadingIcon.style.display = 'block';

          // AJAX request to generate the quiz
          fetch('/generate_quiz', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json'
              },
              body: JSON.stringify({ file_path: filePath })
          })
          .then(response => response.json())
          .then(data => {
              const quizSection = document.getElementById('quiz-questions');
              loadingIcon.style.display = 'none'; // Hide the loading icon
              quizSection.innerHTML = '';

              let questions = data.questions;
              if (typeof questions === 'string') {
                  questions = questions.split('\n'); // assuming each question is on a new line
              }

              let groupedQuestions = [];
              let currentQuestion = null;
              if (questions) {
                  questions.forEach((line) => {
                      if (/^\d+\./.test(line)) { // check if the line starts with a number followed by a dot
                          currentQuestion = { question: line, options: [] };
                          groupedQuestions.push(currentQuestion);
                      } else if (currentQuestion) {
                          currentQuestion.options.push(line);
                      }
                  });

              } else {
                  loadingIcon.style.display = 'none'; // Hide the loading icon
                  alert("The document is too long. Please provide a document with fewer than 5000 words.");
              }


              groupedQuestions.forEach((q, index) => {
                  const questionDiv = document.createElement('div');
                  questionDiv.innerHTML = `<p>${q.question}</p>`;
                  q.options.forEach(option => {
                      const optionDiv = document.createElement('div');
                      optionDiv.innerHTML = `<p>${option}</p>`;
                      questionDiv.appendChild(optionDiv);
                  });

                  // Add extra space between questions (i actually don't think this works because it interprets each line as a question right now)
                  questionDiv.style.marginTop = '25px';
                  questionDiv.style.marginBottom = '25px';

                  quizSection.appendChild(questionDiv);
              });
          })
          .catch(error => {
              alert("Error: " + error.message);
          });
      }



    function delete_pdf(file_path){
        const filePath = "{{ file_path }}";  // pass file path to the backend
        fetch('/delete_pdf', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ file_path: file_path }),
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('PDF deleted successfully.');
                window.location.href = '/'; // reload to update the list of PDFs
            } else {
                alert('Error deleting PDF: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error deleting PDF:', error);
            alert('An error occurred. Please try again later.');
        });
    }

  </script>
